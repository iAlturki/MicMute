name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'  # Also triggers on version tags
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Visual Studio environment
      uses: microsoft/setup-msbuild@v2
      
    - name: Build application
      run: |
        # Create build directory
        if (!(Test-Path "build")) { New-Item -ItemType Directory -Path "build" }
        
        # Setup Visual Studio environment and build
        cmd /c '"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && rc /fo build\resources.res src\resources.rc && cl /O2 /EHsc /Fe:build\iAlturki-MicMute.exe src\*.c build\resources.res user32.lib shell32.lib ole32.lib winmm.lib gdi32.lib advapi32.lib'
        
        # Clean up build artifacts  
        Remove-Item -Path "*.obj" -ErrorAction SilentlyContinue
        Remove-Item -Path "build\*.res" -ErrorAction SilentlyContinue
      
    - name: Check if executable exists
      run: |
        if (Test-Path "build\iAlturki-MicMute.exe") {
          Write-Host "✅ Executable built successfully"
          Get-Item "build\iAlturki-MicMute.exe" | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Host "❌ Executable not found"
          exit 1
        }
      
    - name: Generate release info
      id: release_info
      run: |
        if ("${{ github.ref }}" -like "refs/tags/*") {
          $version = "${{ github.ref_name }}"
          $is_prerelease = "false"
        } else {
          $short_sha = "${{ github.sha }}".Substring(0, 7)
          $version = "dev-$short_sha"
          $is_prerelease = "true"
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "is_prerelease=$is_prerelease" >> $env:GITHUB_OUTPUT
        echo "Generated version: $version"
      
    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/iAlturki-MicMute.exe
          Mic_Muted_icon.ico
          README.md
        name: iAlturki-MicMute ${{ steps.release_info.outputs.version }}
        tag_name: ${{ steps.release_info.outputs.version }}
        body: |
          ## iAlturki-MicMute ${{ steps.release_info.outputs.version }}
          
          High-performance microphone mute/unmute utility built with C and Windows API.
          
          ### Features:
          - 🎯 Global hotkey support (F8 default)
          - 🔧 System tray integration
          - 👁️ Overlay visual indicator with 9 position options
          - 🔊 Audio feedback (customizable)
          - 🚀 Auto-start with Windows
          - 💾 Persistent settings storage
          - ⚡ Minimal resource usage (~125KB)
          - 🎮 Fullscreen game overlay support
          
          ### Installation:
          1. Download `iAlturki-MicMute.exe`
          2. Download `Mic_Muted_icon.ico` (place in same folder as exe)
          3. Run the executable
          4. Use F8 to toggle microphone mute/unmute
          
          ### System Requirements:
          - Windows 10/11 (64-bit)
          - ~125KB disk space
          - Minimal system resources
          
          **Built with:** C, Windows API, Visual Studio 2022
        draft: false
        prerelease: ${{ steps.release_info.outputs.is_prerelease }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
