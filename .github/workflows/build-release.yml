name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Only triggers on version tags for releases
  workflow_dispatch:  # Allows manual trigger

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Visual Studio environment
      uses: microsoft/setup-msbuild@v2
      
    - name: Build single executable
      run: |
        # Create build directory
        if (!(Test-Path "build")) { New-Item -ItemType Directory -Path "build" }
        
        # Setup Visual Studio environment and build with embedded resources
        cmd /c '"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && rc /fo build\resources.res src\resources.rc && cl /O2 /EHsc /Fe:build\iAlturki-MicMute.exe src\*.c build\resources.res user32.lib shell32.lib ole32.lib winmm.lib gdi32.lib advapi32.lib /link /SUBSYSTEM:WINDOWS'
        
        # Clean up build artifacts  
        Remove-Item -Path "*.obj" -ErrorAction SilentlyContinue
        Remove-Item -Path "build\*.res" -ErrorAction SilentlyContinue
      
    - name: Verify build
      run: |
        if (Test-Path "build\iAlturki-MicMute.exe") {
          Write-Host "✅ Single executable built successfully"
          $file = Get-Item "build\iAlturki-MicMute.exe"
          Write-Host "📦 Size: $($file.Length) bytes"
          Write-Host "📅 Built: $($file.LastWriteTime)"
        } else {
          Write-Host "❌ Executable not found"
          exit 1
        }
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: build/iAlturki-MicMute.exe
        name: iAlturki-MicMute ${{ github.ref_name }}
        body: |
          ## 🎙️ iAlturki-MicMute ${{ github.ref_name }}
          
          **Single-file microphone mute utility for Windows**
          
          ### ⚡ Quick Start
          1. Download `iAlturki-MicMute.exe` 
          2. Run the executable
          3. Press **F8** to toggle mute/unmute
          
          ### 🎯 Features
          - Global hotkey support (F8 default, customizable)
          - System tray integration with context menu
          - Visual overlay indicator (9 positions, 5 sizes)
          - Audio feedback with Windows notification sounds
          - Multi-monitor support
          - Auto-start with Windows option
          - Persistent settings storage
          
          ### 📋 Requirements
          - Windows 10/11 (64-bit)
          - ~140KB disk space
          - No additional files needed
          
          ### 🔧 Settings
          Right-click system tray icon to access:
          - Hotkey options (F1-F12, Ctrl+M)
          - Overlay size and position
          - Audio feedback settings
          - Startup configuration
          
          **Self-contained executable with embedded icon and resources**
        draft: false
        prerelease: false
        token: ${{ secrets.GITHUB_TOKEN }}